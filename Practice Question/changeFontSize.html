<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Font Size</title>
</head>
<body >
    <button id="btnchangeSize" onclick="changeSize()" style="cursor: pointer;">Click To Change Font Size</button>
    <h1 id="heading">I am Heading</h1>
    <script>
        function changeSize(){
            let a = document.getElementById("heading");
            a.style.fontSize = "10px";
        }
    </script>
</body>
</html>
