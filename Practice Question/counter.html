<!-- 6. Count Button Clicks
 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Button Clicks</title>
    <style>
        #btnincrease{
            background-color: green;
            cursor: pointer;
        }
        #btndecrese{
            background-color: orange;
            cursor: pointer;
        }
        #btnreset{
            background-color: red;
            cursor: pointer;
        }
        
    </style>
</head>

<body>
    <h1 id="count">0</h1>
    <button onclick="increse()" id="btnincrease">Increase</button>
    <button onclick="reset()" id="btnreset">Reset</button>
    <button onclick="decrease()" id="btndecrese">Decrease</button>
    <script>
        
        let count = 0;
        function increse() {
            count++;
            document.getElementById("count").textContent = count;
            
        }
        function decrease(){
            count--;
            document.getElementById("count").textContent = count;
        }
        function reset(){
                count= 0;
                document.getElementById("count").textContent = count;
            }
    </script>
</body>

</html>
