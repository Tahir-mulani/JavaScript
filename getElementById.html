<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        function show() {
            let headingTag = document.getElementById("heading");
            let str = headingTag.innerHTML;
            alert(str);
        }
    </script>
</head>

<body>
    <h1 id="heading">Welcome to javascript</h1>
    <button id="name"
        style="color: black; font-weight: bold; cursor: pointer; background-color: lightblue; border:none; width: 150px; height:50px;" onclick="show()">Click to Get Heading Notification</button>
</body>

</html>
