 
<html>
 <head>
  <title>Example of setTimeOut</title>
  
  <script type='text/javascript'>
    function test(){
	 let heading=document.getElementById("h");
	   setTimeout(()=>{
	     heading.innerHTML="";
		 let d = new Date();
		 heading.innerHTML=d.toLocaleTimeString();
	   },1000);
	}
  </script>
 </head>
<body>
 
 <input type="submit"  name="s" value="Say good morning after 10 seconds " 
 style="padding:10px;" onclick='test()' />

 <h1 id="h"> </h1>
</body>
</html>
