<html>
 <head>
  <title>Example of setInterval</title>
  <script type='text/javascript'>
    function test(){
	
	   setInterval(show,10000);
	}
	function show()
	{ alert("good morning");
	}
  </script>
 </head>
<body>
 <input type="submit"  name="s" value="Say good morning after 10 seconds " 
 style="padding:10px;" onclick='test()' />
</body>
</html>
