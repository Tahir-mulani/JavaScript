<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validation</title>
    <style>
        .container {
            margin: auto;
            padding: 10px 20px;
            border: 1px solid #000;
            width: 50%;
            min-height: 100px;
            color: black;
        }

     
    </style>
</head>

<body>
    <div class="container">
        <h1>Email Verification</h1>
        <input type="text" id="Email" autocomplete="off">
        <button onclick="validateEmail()" id="btnsubmit">Next</button>
        <span id="error_msg"></span>

    </div>

    <!-- JavaScript validation  code -->
    <script>


        let msg = document.getElementById("error_msg");

        function validateEmail() {
            let str = document.getElementById("Email").value;

            let atIndex = str.indexOf('@');
            let dotIndex = str.lastIndexOf('.');

            if (str.length == 0) {
                msg.innerHTML = "!Email Can't be empty";
                msg.style.color = "red";
                return;
            }
            else if (str.charAt(0) == '@') {
                msg.innerHTML = "!Invalid Email";
                msg.style.color = "red";
                return;
            }
            else if (!str.includes('@')) {
                msg.innerHTML = "!Missing '@' ";
                msg.style.color = "red";
                return;
            }
            else if (!str.includes('.')) {
                msg.innerHTML = "!Missing dot  (.) ";
                msg.style.color = "red";
                return;
            }

            if (dotIndex < atIndex) {
                msg.innerHTML = "! Dot must be after @";
                msg.style.color = "red";
            }
            else if (dotIndex === str.length - 1) {
                msg.innerHTML = "!dot cannot be last";
                msg.style.color = "red";

            }
            else {
                msg.innerHTML = "Valid Email";
                msg.style.color = "green"; 
            }
        }
    </script>





</body>

</html>
