<!-- 1. Change Text on Button Click
Description: Change paragraph text when a button is clicked.
Practice: getElementById, innerText -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change The Paragrap Text</title>
    <script type="text/javascript">
        function show() {
            let headingTag = document.getElementById("paragraph");
            headingTag.innerHTML = "Paragraph changed";

        }
    </script>
</head>

<body>
    <p id="paragraph">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Aut autem expedita quidem iusto
        asperiores fugit
        deserunt culpa! Quae, a cupiditate!</p>
    <button id="name"
        style="color: black; font-weight: bold; cursor: pointer; background-color: lightblue; border:none; width: 150px; height:50px;"
        onclick="show()">Click to Change the Paragraph</button>
</body>

</html>
